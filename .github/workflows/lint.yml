name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Pinned so the gate can't drift "green today, red tomorrow". The rule set
      # (pyflakes F only) is configured in pyproject.toml [tool.ruff.lint].
      - run: pip install ruff==0.15.17
      - run: ruff check --output-format=github
