name: labeler

# Auto-labels pull requests by which paths they touch (see .github/labeler.yml).
#
# Uses `pull_request_target` so it can label PRs from forks — the default token
# on a fork's `pull_request` run is read-only and cannot add labels.
#
# SECURITY: this workflow never checks out or executes PR code. It only reads the
# changed-file list and applies labels through the API, so running it in the base
# (privileged) context is safe.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5
