name: "Config parsing issue"
description: "A Huawei VRP/USG config snippet that vrp-ir parses incorrectly (the most valuable report)."
title: "[parse] <short description>"
labels: ["parser"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks! A real (but **de-identified**) snippet we parse wrong is the single
        most useful contribution. Please scrub real IPs, hostnames, keys and
        community strings before pasting — synthetic values are perfect.
        See `docs/de-identifying-configs.md` for the de-identification checklist.
  - type: textarea
    id: snippet
    attributes:
      label: Config snippet (de-identified)
      description: The smallest VRP/USG snippet that reproduces the problem.
      render: text
      placeholder: |
        interface GigabitEthernet0/0/1
         ip address 10.0.0.1 255.255.255.0
        #
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected parse / behavior
      description: What should the IR (or `vrp-ir audit` finding) contain? Include expected `SourceRef`, finding ID, or cited line when relevant.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual parse / behavior
      description: What does `vrp-ir parse` / `vrp-ir audit` produce instead? Paste the relevant output.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: vrp-ir version
      placeholder: "0.9.0"
    validations:
      required: false
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: The snippet contains no real production data (it is synthetic or de-identified).
          required: true
        - label: I scrubbed hostnames, IPs, SNMP communities, passwords, keys and customer identifiers.
          required: true
        - label: This is the smallest snippet I could make while still reproducing the problem.
          required: true
        - label: If the issue depends on encoding, I stated that explicitly in the issue body (for example GB18030/GBK).
          required: false
