name: "Bug report"
description: "A crash, wrong output, or other defect not specific to a single config line."
title: "[bug] <short description>"
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Describe the bug and how to reproduce it.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Commands run and synthetic/de-identified input used. See docs/de-identifying-configs.md.
      render: shell
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: vrp-ir version / Python version
      placeholder: "vrp-ir 0.6.0, Python 3.12"
    validations:
      required: false
  - type: checkboxes
    id: data-safety
    attributes:
      label: Data safety
      options:
        - label: Any config snippet or command output is synthetic or de-identified.
          required: true
