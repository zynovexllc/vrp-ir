name: "Bug report"
description: "A crash, wrong output, or other defect not specific to a single config line."
title: "[bug] <short description>"
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Describe the bug and how to reproduce it.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Commands run and (de-identified) input used.
      render: shell
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: vrp-ir version / Python version
      placeholder: "vrp-ir 0.6.0, Python 3.12"
    validations:
      required: false
